name: 🏷️ Commit Count Badge

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  commit-badge:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get full commit history

      - name: 📊 Count commits
        id: count
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "commit_count=$COUNT" >> $GITHUB_OUTPUT

      - name: 🎨 Generate badge
        id: badge
        run: |
          mkdir -p badges
          COUNT=${{ steps.count.outputs.commit_count }}
          curl -o badges/commit-count.svg "https://img.shields.io/badge/commits-$COUNT-blue"

      - name: ✅ Commit and push badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/commit-count.svg
          git commit -m "🔄 Update commit count badge" || echo "No changes to commit"
          git push
