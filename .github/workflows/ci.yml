name: 🧪 Test • 📊 Coverage • 🧮 Commit Badge

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install coverage coverage-badge pytest

      - name: 🧪 Run tests + generate coverage
        run: |
          coverage run -m pytest -vv
          coverage-badge -f -o coverage.svg

      - name: 🔢 Generate Commit Count Badge
        uses: FMorschel/commit-count-badge@v1
        with:
          repository: '7pandeys/7pandeys.github.io'
          author: '7pandeys'
          outputPath: 'commit-count.svg'
          text: 'Commits'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Commit & push badges
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p badges/
          mv coverage.svg badges/
          mv commit-count.svg badges/

          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com

          git add badges/*.svg || true
          git commit -m "📈 Update coverage and commit badges" || echo "No changes to commit"
          git push
