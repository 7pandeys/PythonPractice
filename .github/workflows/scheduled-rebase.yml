# .github/workflows/scheduled-rebase.yml
name: 🔁 Scheduled Rebase dev → main

on:
  schedule:
    - cron: '0 19 * * *'  # Runs daily at 12:30 AM IST
  workflow_dispatch:  # Optional: allows manual trigger

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: experiment
          token: ${{ secrets.GITHUB_TOKEN }}  # Use a PAT with write access
          fetch-depth: 0

      - name: 🔀 Rebase dev onto main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin edge
          git rebase origin/edge

      - name: 🚀 Push rebased dev
        run: |
          git push origin experiment --force-with-lease