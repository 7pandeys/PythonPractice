name: 🔁 Scheduled Sync experiment ← edge

on:
  schedule:
    - cron: '0 19 * * *'  # Runs daily at 12:30 AM IST
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout experiment branch
        uses: actions/checkout@v4
        with:
          ref: experiment
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔧 Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🔁 Fetch and merge edge into experiment
        run: |
          git fetch origin edge
          git merge origin/edge -X theirs --no-edit || true

      - name: 🚀 Push updated experiment
        run: |
          git push origin experiment
